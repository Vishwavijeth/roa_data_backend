name: Daily Cron Test

on:
  schedule:
    - cron: "0 */6 * * *"   # Every 6 hours (UTC)
  workflow_dispatch:        # manual trigger

jobs:
  trigger-cron:
    runs-on: ubuntu-latest

    steps:
      - name: Call FastAPI Cron
        run: |
          curl -X GET "https://roa-data-backend.vercel.app/data-sync"